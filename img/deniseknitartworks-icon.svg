<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="needleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#99ff66" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="18" ry="18" fill="#101a27"/>
  <g filter="url(#glow)" stroke="url(#needleGradient)" stroke-width="6" stroke-linecap="round">
    <line x1="25" y1="20" x2="75" y2="80"/>
    <line x1="75" y1="20" x2="25" y2="80"/>
  </g>
  <circle cx="25" cy="20" r="5" fill="#3ccfff" opacity="0.85"/>
  <circle cx="75" cy="20" r="5" fill="#3ccfff" opacity="0.85"/>
</svg>
